# Before starting: copy each .env.example to .env and fill in secrets
# cp services/auth/.env.example services/auth/.env
# cp services/menu/.env.example services/menu/.env
# cp services/admin/.env.example services/admin/.env
# cp services/billing/.env.example services/billing/.env
# cp services/analytics/.env.example services/analytics/.env

networks:
  qrmenu-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - menu-service
      - admin-service
      - billing-service
      - analytics-service
      - owner-service
      - menu-frontend
      - admin-frontend
      - owner-frontend
    networks:
      - qrmenu-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qrmenu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-qrmenu}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qrmenu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qrmenu} -d ${POSTGRES_DB:-qrmenu}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - qrmenu-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-qrmenu}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-secret}
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - qrmenu-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - qrmenu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qrmenu-network
    restart: unless-stopped

  menu-service:
    build:
      context: ./services/menu
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - qrmenu-network
    restart: unless-stopped

  admin-service:
    build:
      context: ./services/admin
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - qrmenu-network
    restart: unless-stopped

  billing-service:
    build:
      context: ./services/billing
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - qrmenu-network
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - qrmenu-network
    restart: unless-stopped

  owner-service:
    build:
      context: ./services/owner
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qrmenu-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  menu-frontend:
    build:
      context: ./frontend
      dockerfile: packages/menu/Dockerfile
    networks:
      - qrmenu-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin-frontend:
    build:
      context: ./frontend
      dockerfile: packages/admin/Dockerfile
      args:
        VITE_APP_URL: "${VITE_APP_URL:-http://localhost}"
        VITE_API_URL: "${VITE_API_URL:-http://localhost}"
    networks:
      - qrmenu-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  owner-frontend:
    build:
      context: ./frontend
      dockerfile: packages/owner/Dockerfile
    networks:
      - qrmenu-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
