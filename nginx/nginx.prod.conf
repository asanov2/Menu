user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml application/font-woff2;
    gzip_min_length 1000;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── SSL shared config ────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver_timeout 5s;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    # login/register: tight brute-force protection
    limit_req_zone $binary_remote_addr zone=login_zone:10m  rate=5r/m;
    # general authenticated API
    limit_req_zone $binary_remote_addr zone=api_zone:10m    rate=10r/s;
    # public guest menu (higher throughput)
    limit_req_zone $binary_remote_addr zone=menu_zone:10m   rate=30r/s;
    # admin panel API
    limit_req_zone $binary_remote_addr zone=admin_zone:10m  rate=10r/s;

    # ── Backend upstreams ────────────────────────────────────────────────────
    upstream auth_service      { server auth-service:8002; }
    upstream menu_service      { server menu-service:8001; }
    upstream admin_service     { server admin-service:8003; }
    upstream billing_service   { server billing-service:8005; }
    upstream analytics_service { server analytics-service:8004; }
    upstream owner_service     { server owner-service:8006; }
    upstream minio_service     { server minio:9000; }

    # ── Frontend upstreams ───────────────────────────────────────────────────
    upstream menu_frontend  { server menu-frontend:80; }
    upstream admin_frontend { server admin-frontend:80; }
    upstream owner_frontend { server owner-frontend:80; }

    # ── HTTP → HTTPS redirect (all hosts) ───────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        # certbot webroot challenge for certificate renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: qrmenus.kz (main domain) ─────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name qrmenus.kz www.qrmenus.kz;

        ssl_certificate     /etc/letsencrypt/live/qrmenus.kz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/qrmenus.kz/privkey.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Auth — login/register: strict rate limit
        location = /api/v1/auth/login {
            limit_req zone=login_zone burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location = /api/v1/auth/register {
            limit_req zone=login_zone burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/auth/ {
            limit_req zone=api_zone burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Public menu API — high throughput
        location /api/v1/menu/ {
            limit_req zone=menu_zone burst=50 nodelay;
            limit_req_status 429;
            proxy_pass http://menu_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/admin/ {
            limit_req zone=admin_zone burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://admin_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Webhook endpoints — no rate limiting (external payment provider)
        location = /api/v1/billing/webhook/kaspi {
            proxy_pass http://billing_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location = /api/v1/billing/webhook/cloudpayments {
            proxy_pass http://billing_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/billing/ {
            limit_req zone=admin_zone burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://billing_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/analytics/ {
            limit_req zone=admin_zone burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://analytics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/owner/ {
            limit_req zone=admin_zone burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://owner_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Static images — served from MinIO, long cache TTL
        location /images/ {
            proxy_pass http://minio_service/qrmenu-images/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Landing page
        location = / {
            root /usr/share/nginx/landing;
            try_files /index.html =404;
            default_type text/html;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Everything else → guest menu SPA
        location / {
            proxy_pass http://menu_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }

    # ── HTTPS: admin.qrmenus.kz ──────────────────────────────────────────────
    server {
