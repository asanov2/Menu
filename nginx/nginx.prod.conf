user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml application/font-woff2;
    gzip_min_length 1000;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=login_zone:10m  rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m    rate=10r/s;
    limit_req_zone $binary_remote_addr zone=menu_zone:10m   rate=30r/s;
    limit_req_zone $binary_remote_addr zone=admin_zone:10m  rate=10r/s;

    # ── Backend upstreams ────────────────────────────────────────────────────
    upstream auth_service      { server auth-service:8002; }
    upstream menu_service      { server menu-service:8001; }
    upstream admin_service     { server admin-service:8003; }
    upstream billing_service   { server billing-service:8005; }
    upstream analytics_service { server analytics-service:8004; }
    upstream owner_service     { server owner-service:8006; }
    upstream minio_service     { server minio:9000; }

    # ── Frontend upstreams ───────────────────────────────────────────────────
    upstream menu_frontend  { server menu-frontend:80; }
    upstream admin_frontend { server admin-frontend:80; }
    upstream owner_frontend { server owner-frontend:80; }

    # ── HTTP port 80 — main domain ───────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Auth — brute-force protected endpoints
        location = /api/v1/auth/login {
            limit_req zone=login_zone burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location = /api/v1/auth/register {
            limit_req zone=login_zone burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/auth/ {
            limit_req zone=api_zone burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Public menu API — high throughput
        location /api/v1/menu/ {
            limit_req zone=menu_zone burst=50 nodelay;
            limit_req_status 429;
            proxy_pass http://menu_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Telegram webhook — no rate limiting (external provider)
        location = /api/v1/telegram/webhook {
            proxy_pass http://admin_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Payment webhooks — no rate limiting (external providers)
        location = /api/v1/billing/webhook/kaspi {
            proxy_pass http://billing_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location = /api/v1/billing/webhook/cloudpayments {
            proxy_pass http://billing_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Static images from MinIO
        location /images/ {
            proxy_pass http://minio_service/qrmenu-items/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Landing page (exact match)
        location = / {
            root /usr/share/nginx/landing;
            try_files /index.html =404;
            default_type text/html;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Guest menu SPA — everything else
        location / {
            proxy_pass http://menu_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }

    # ── Port 8080 — admin panel ──────────────────────────────────────────────
    server {
        listen 8080 default_server;
        server_name _;

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location = /api/v1/auth/login {
            limit_req zone=login_zone burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/auth/ {
            limit_req zone=api_zone burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/admin/ {
            limit_req zone=admin_zone burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://admin_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Telegram webhook — no rate limiting
        location = /api/v1/telegram/webhook {
            proxy_pass http://admin_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/billing/ {
            limit_req zone=admin_zone burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://billing_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/analytics/ {
            limit_req zone=admin_zone burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://analytics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /images/ {
            proxy_pass http://minio_service/qrmenu-items/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://admin_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }

    # ── Port 8081 — owner panel ──────────────────────────────────────────────
    server {
        listen 8081 default_server;
        server_name _;

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location = /api/v1/owner/login {
            limit_req zone=login_zone burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://owner_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/auth/ {
            limit_req zone=api_zone burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/owner/ {
            limit_req zone=admin_zone burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://owner_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location / {
            proxy_pass http://owner_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}
