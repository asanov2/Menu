user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;
    gzip on; gzip_vary on; gzip_proxied any; gzip_comp_level 6;
    gzip_min_length 1000;
    resolver 127.0.0.11 valid=10s ipv6=off;
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=menu_zone:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=admin_zone:10m rate=10r/s;
    server {
        listen 80 default_server; server_name _;
        set $auth_service "auth-service:8002";
        set $menu_service "menu-service:8001";
        set $admin_service "admin-service:8003";
        set $billing_service "billing-service:8005";
        set $minio_service "minio:9000";
        set $menu_frontend "menu-frontend:80";
        location /health { return 200 '{"status":"ok"}'; add_header Content-Type application/json; }
        location = /api/v1/auth/login { limit_req zone=login_zone burst=2 nodelay; proxy_pass http://$auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location = /api/v1/auth/register { limit_req zone=login_zone burst=2 nodelay; proxy_pass http://$auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/auth/ { limit_req zone=api_zone burst=30 nodelay; proxy_pass http://$auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/menu/ { limit_req zone=menu_zone burst=50 nodelay; proxy_pass http://$menu_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location = /api/v1/telegram/webhook { proxy_pass http://$admin_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location = /api/v1/billing/webhook/kaspi { proxy_pass http://$billing_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /images/ { proxy_pass http://$minio_service/qrmenu-items/; proxy_set_header Host minio:9000; proxy_buffering off; expires 30d; }
        location = / { root /usr/share/nginx/landing; try_files /index.html =404; add_header Cache-Control "no-cache, must-revalidate"; }
        location / { proxy_pass http://$menu_frontend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    }
    server {
        listen 8080 default_server; server_name _;
        set $auth_service "auth-service:8002";
        set $admin_service "admin-service:8003";
        set $billing_service "billing-service:8005";
        set $analytics_service "analytics-service:8004";
        set $minio_service "minio:9000";
        set $admin_frontend "admin-frontend:80";
        set $notification_service "notification-service:8007";
        location /health { return 200 '{"status":"ok"}'; add_header Content-Type application/json; }
        location = /api/v1/auth/login { limit_req zone=login_zone burst=2 nodelay; proxy_pass http://$auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/auth/ { limit_req zone=api_zone burst=20 nodelay; proxy_pass http://$auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/admin/ { limit_req zone=admin_zone burst=20 nodelay; proxy_pass http://$admin_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 60s; }
        location = /api/v1/telegram/webhook { proxy_pass http://$admin_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/v1/billing/ { limit_req zone=admin_zone burst=30 nodelay; proxy_pass http://$billing_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/analytics/ { limit_req zone=admin_zone burst=30 nodelay; proxy_pass http://$analytics_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/push/internal/ { return 403; }
        location /api/v1/push/ { limit_req zone=admin_zone burst=20 nodelay; proxy_pass http://$notification_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /images/ { proxy_pass http://$minio_service/qrmenu-items/; proxy_set_header Host minio:9000; proxy_buffering off; expires 30d; }
        location / { proxy_pass http://$admin_frontend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    }
    server {
        listen 8081 default_server; server_name _;
        set $auth_service "auth-service:8002";
        set $owner_service "owner-service:8006";
        set $owner_frontend "owner-frontend:80";
        set $notification_service "notification-service:8007";
        location /health { return 200 '{"status":"ok"}'; add_header Content-Type application/json; }
        location = /api/v1/owner/login { limit_req zone=login_zone burst=2 nodelay; proxy_pass http://$owner_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/auth/ { limit_req zone=api_zone burst=20 nodelay; proxy_pass http://$auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/owner/ { limit_req zone=admin_zone burst=20 nodelay; proxy_pass http://$owner_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 60s; }
        location /api/v1/push/internal/ { return 403; }
        location /api/v1/push/ { limit_req zone=admin_zone burst=20 nodelay; proxy_pass http://$notification_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location / { proxy_pass http://$owner_frontend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    }

    server {
        listen 80;
        server_name admin.qrmenus.kz;
        set $auth_service      "auth-service:8002";
        set $admin_service     "admin-service:8003";
        set $billing_service   "billing-service:8005";
        set $analytics_service "analytics-service:8004";
        set $minio_service     "minio:9000";
        set $admin_frontend    "admin-frontend:80";
        set $notification_service "notification-service:8007";
        location /health { return 200 '{"status":"ok"}'; add_header Content-Type application/json; }
        location = /api/v1/auth/login { limit_req zone=login_zone burst=2 nodelay; proxy_pass http://$auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/auth/ { limit_req zone=api_zone burst=20 nodelay; proxy_pass http://$auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/admin/ { limit_req zone=admin_zone burst=20 nodelay; proxy_pass http://$admin_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 60s; }
        location = /api/v1/telegram/webhook { proxy_pass http://$admin_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/v1/billing/ { limit_req zone=admin_zone burst=30 nodelay; proxy_pass http://$billing_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/analytics/ { limit_req zone=admin_zone burst=30 nodelay; proxy_pass http://$analytics_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/push/internal/ { return 403; }
        location /api/v1/push/ { limit_req zone=admin_zone burst=20 nodelay; proxy_pass http://$notification_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /images/ { proxy_pass http://$minio_service/qrmenu-items/; proxy_set_header Host minio:9000; proxy_buffering off; expires 30d; }
        location / { proxy_pass http://$admin_frontend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    }
    server {
        listen 80;
        server_name owner.qrmenus.kz;
        set $auth_service   "auth-service:8002";
        set $owner_service  "owner-service:8006";
        set $owner_frontend "owner-frontend:80";
        set $notification_service "notification-service:8007";
        location /health { return 200 '{"status":"ok"}'; add_header Content-Type application/json; }
        location = /api/v1/owner/login { limit_req zone=login_zone burst=2 nodelay; proxy_pass http://$owner_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/auth/ { limit_req zone=api_zone burst=20 nodelay; proxy_pass http://$auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/v1/owner/ { limit_req zone=admin_zone burst=20 nodelay; proxy_pass http://$owner_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 60s; }
        location /api/v1/push/internal/ { return 403; }
        location /api/v1/push/ { limit_req zone=admin_zone burst=20 nodelay; proxy_pass http://$notification_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location / { proxy_pass http://$owner_frontend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    }

}