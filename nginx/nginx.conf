user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=login_zone:10m  rate=5r/m;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m   rate=60r/m;
    limit_req_zone $binary_remote_addr zone=menu_zone:10m   rate=60r/m;
    limit_req_zone $binary_remote_addr zone=admin_zone:10m  rate=30r/m;

    # Backend upstreams
    upstream auth_service      { server auth-service:8002; }
    upstream menu_service      { server menu-service:8001; }
    upstream admin_service     { server admin-service:8003; }
    upstream billing_service   { server billing-service:8005; }
    upstream analytics_service { server analytics-service:8004; }
    upstream owner_service     { server owner-service:8006; }
    upstream minio_service     { server minio:9000; }

    # Frontend upstreams
    upstream menu_frontend  { server menu-frontend:80; }
    upstream admin_frontend { server admin-frontend:80; }
    upstream owner_frontend { server owner-frontend:80; }

    # ── Main domain: qrmenu.kz ──────────────────────────────────────────────
    server {
        listen 80;
        server_name qrmenu.kz www.qrmenu.kz localhost 127.0.0.1;

        # Auth API
        location = /api/v1/auth/login {
            limit_req zone=login_zone burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location = /api/v1/auth/register {
            limit_req zone=login_zone burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/auth/ {
            limit_req zone=auth_zone burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/menu/ {
            limit_req zone=menu_zone burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://menu_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/admin/ {
            limit_req zone=admin_zone burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://admin_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Telegram webhook — NO rate limiting (Telegram sends these)
        location = /api/v1/telegram/webhook {
            proxy_pass http://admin_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Webhook endpoints — NO rate limiting
        location = /api/v1/billing/webhook/kaspi {
            proxy_pass http://billing_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location = /api/v1/billing/webhook/cloudpayments {
            proxy_pass http://billing_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/billing/ {
            limit_req zone=admin_zone burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://billing_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/analytics/ {
            limit_req zone=admin_zone burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://analytics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/owner/ {
            limit_req zone=admin_zone burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://owner_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location /images/ {
            proxy_pass http://minio_service/qrmenu-images/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Landing page — served as static file at root
        location = / {
            root /usr/share/nginx/landing;
            try_files /index.html =404;
            default_type text/html;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Everything else → guest menu frontend (SPA)
        location / {
            proxy_pass http://menu_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }

    # ── Admin subdomain ─────────────────────────────────────────────────────
    server {
        listen 80;
        listen 8080 default_server;
        server_name admin.qrmenu.kz admin.localhost;

        location = /api/v1/auth/login {
            limit_req zone=login_zone burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/admin/ {
            proxy_pass http://admin_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location /api/v1/billing/ {
            proxy_pass http://billing_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/analytics/ {
            proxy_pass http://analytics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /images/ {
            proxy_pass http://minio_service/qrmenu-images/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://admin_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }

    # ── Owner subdomain ─────────────────────────────────────────────────────
    server {
        listen 80;
        listen 8081 default_server;
        server_name owner.qrmenu.kz owner.localhost;

        location /api/v1/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/v1/owner/ {
            proxy_pass http://owner_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location / {
            proxy_pass http://owner_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }

    # ── Catch-all for bare IP / unknown hosts ───────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location / {
            return 444;
        }
    }
}
